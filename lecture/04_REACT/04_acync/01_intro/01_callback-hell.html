<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>

    <h1>콘솔 확인!</h1>
    <script> 
       function sayHello(){
            console.log('3초 뒤에 음식이 나왔습니다.');
       };
       console.log('햄버거를 주문합니다.');
       setTimeout(sayHello, 3000);
       //setTimeout은 3초 동안 코드를 멈추게 하는 게 아니라,
       //3초 뒤 실행할 일을 맡겨두고 다음 코드부터 계속 실행하는 방식(논블로킹)
       console.log('감자튀김을 주문합니다.');

       function increase(number, callback){
        setTimeout(() => {
            const result = number + 10;
            console.log(result);
            if (callback){
                callback(result);
            }
        }, 1000);
       }

       console.log('작업 시작...');
       //0부터 시작해서 10씩 3번 더하는 작업을 순차적으로 실행하고 싶을 때...
       increase(0, (result) => {
            increase(result, (result)=> {
                increase(result, (result) =>{
                    console.log('모든 작업이 끝났습니다.');
                });
            });
    });
    </script>
</body>
</html>
